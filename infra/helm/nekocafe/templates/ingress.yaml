{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nekocafe.fullname" . }}
  labels:
    {{- include "nekocafe.labels" . | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /reservations
            pathType: Prefix
            backend:
              service:
                name: {{ include "nekocafe.fullname" . }}-reservation-service
                port:
                  name: http
          - path: /members
            pathType: Prefix
            backend:
              service:
                name: {{ include "nekocafe.fullname" . }}-member-service
                port:
                  name: http
{{- end }}
