name: cd

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        default: staging
        options: [dev, staging, prod]
      image_tag:
        required: true
        default: latest
      canary_weight:
        required: true
        default: "5"

permissions:
  contents: read

concurrency:
  group: cd-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint infra/helm/nekocafe -f infra/helm/nekocafe/values-${{ inputs.environment }}.yaml

      - name: Render manifests
        run: |
          helm template nekocafe infra/helm/nekocafe \
            -n nekocafe-${{ inputs.environment }} \
            -f infra/helm/nekocafe/values-${{ inputs.environment }}.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --set rollout.canaryWeight=${{ inputs.canary_weight }} \
            > rendered-${{ inputs.environment }}.yaml
          grep -E "kind: (Deployment|Service|Ingress|HorizontalPodAutoscaler)" rendered-${{ inputs.environment }}.yaml

      - name: Canary release plan
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Image tag: ${{ inputs.image_tag }}"
          echo "Canary weight: ${{ inputs.canary_weight }}%"
          echo "Rollback command: helm rollback nekocafe -n nekocafe-${{ inputs.environment }}"

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ inputs.environment }}-manifests
          path: rendered-${{ inputs.environment }}.yaml
