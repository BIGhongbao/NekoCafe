name: ci

on:
  pull_request:
  push:
    branches: [main, experiment-3]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            D3-2_源代码与配置仓库/services/reservation/requirements.txt
            D3-2_源代码与配置仓库/services/member/requirements.txt

      - name: Install dependencies
        working-directory: D3-2_源代码与配置仓库
        run: |
          python -m pip install --upgrade pip
          pip install -r services/reservation/requirements.txt
          pip install ruff bandit pip-audit

      - name: Lint
        working-directory: D3-2_源代码与配置仓库
        run: ruff check services

      - name: Unit tests
        working-directory: D3-2_源代码与配置仓库
        run: |
          pytest services/reservation/tests -q
          pytest services/member/tests -q

      - name: SAST
        working-directory: D3-2_源代码与配置仓库
        run: bandit -r services -ll

      - name: Dependency audit
        working-directory: D3-2_源代码与配置仓库
        run: pip-audit -r services/reservation/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reservation-service image
        uses: docker/build-push-action@v6
        with:
          context: D3-2_源代码与配置仓库/services/reservation
          tags: nekocafe/reservation-service:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build member-service image
        uses: docker/build-push-action@v6
        with:
          context: D3-2_源代码与配置仓库/services/member
          tags: nekocafe/member-service:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan reservation-service
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: nekocafe/reservation-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy scan member-service
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: nekocafe/member-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Integration test with docker compose
        working-directory: D3-2_源代码与配置仓库
        run: |
          docker compose up -d --build
          sleep 10
          curl -f http://localhost:8081/healthz
          curl -f http://localhost:8082/healthz
          docker compose down -v

      - name: Metrics summary
        id: metrics
        run: |
          reservation_size=$(docker image inspect nekocafe/reservation-service:${{ github.sha }} --format='{{.Size}}')
          member_size=$(docker image inspect nekocafe/member-service:${{ github.sha }} --format='{{.Size}}')
          echo "reservation_size=$reservation_size" >> "$GITHUB_OUTPUT"
          echo "member_size=$member_size" >> "$GITHUB_OUTPUT"

      - name: PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "### NekoCafe CI Summary",
              "- Lint: passed",
              "- Unit tests: passed",
              "- SAST: passed",
              "- Trivy HIGH/CRITICAL: 0",
              `- reservation image size bytes: ${{ steps.metrics.outputs.reservation_size }}`,
              `- member image size bytes: ${{ steps.metrics.outputs.member_size }}`
            ].join("\n");
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
