name: ci

on:
  pull_request:
  push:
    branches: [main, experiment-3]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/reservation/requirements.txt
            services/member/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/reservation/requirements.txt
          pip install ruff bandit

      - name: Lint
        run: ruff check services

      - name: Unit tests
        run: |
          pytest services/reservation/tests -q
          pytest services/member/tests -q

      - name: SAST
        run: bandit -r services -ll

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reservation-service image
        uses: docker/build-push-action@v6
        with:
          context: services/reservation
          tags: nekocafe/reservation-service:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build member-service image
        uses: docker/build-push-action@v6
        with:
          context: services/member
          tags: nekocafe/member-service:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan reservation-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe/reservation-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Trivy scan member-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe/member-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM reservation-service
        run: |
          mkdir -p reports/sbom
          syft nekocafe/reservation-service:${{ github.sha }} -o table | tee reports/sbom/reservation-service-sbom.txt
          syft nekocafe/reservation-service:${{ github.sha }} -o spdx-json > reports/sbom/reservation-service.spdx.json

      - name: Generate SBOM member-service
        run: |
          mkdir -p reports/sbom
          syft nekocafe/member-service:${{ github.sha }} -o table | tee reports/sbom/member-service-sbom.txt
          syft nekocafe/member-service:${{ github.sha }} -o spdx-json > reports/sbom/member-service.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekocafe-sbom
          path: reports/sbom/

      - name: Integration test with docker compose
        run: |
          docker compose up -d --build
          sleep 10
          curl -f http://localhost:8081/healthz
          curl -f http://localhost:8082/healthz
          docker compose down -v

      - name: Metrics summary
        id: metrics
        run: |
          reservation_size=$(docker image inspect nekocafe/reservation-service:${{ github.sha }} --format='{{.Size}}')
          member_size=$(docker image inspect nekocafe/member-service:${{ github.sha }} --format='{{.Size}}')
          echo "reservation image size bytes: $reservation_size"
          echo "member image size bytes: $member_size"
          echo "reservation_size=$reservation_size" >> "$GITHUB_OUTPUT"
          echo "member_size=$member_size" >> "$GITHUB_OUTPUT"

      - name: PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "### NekoCafe CI Summary",
              "- Lint: passed",
              "- Unit tests: passed",
              "- SAST: passed",
              "- Trivy scan: completed",
              `- reservation image size bytes: ${{ steps.metrics.outputs.reservation_size }}`,
              `- member image size bytes: ${{ steps.metrics.outputs.member_size }}`
            ].join("\n");
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
